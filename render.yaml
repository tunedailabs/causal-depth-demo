services:
  - type: web
    name: causal-depth-demo
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn causal_depth_demo:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TUNED_MODEL_URL
        sync: false
      - key: DEMO_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://demo.tunedailabs.com,https://causal-depth-demo.onrender.com
    plan: free
